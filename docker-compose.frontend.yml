services:
  web:
    build: .
    container_name: iol-web
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "8000:8000"
    command: ["uvicorn", "iol_web.app:app", "--host", "0.0.0.0", "--port", "8000"]
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: iol-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - API_BASE_URL=http://web:8000
    depends_on:
      - web
