<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="IOL Portfolio Dashboard – Visualización de portafolio, retornos, inflación y top movers desde snapshots SQLite." />
    <title>IOL Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2367e8f9'/><stop offset='100%' stop-color='%2334d399'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%230b1020'/><text x='50' y='68' text-anchor='middle' font-size='48' font-weight='800' fill='url(%23g)'>IOL</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v={{ request.app.version }}" />
    <script defer src="/static/app.js?v={{ request.app.version }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="bg"></div>
    <header class="topbar">
      <div class="brand">
        <div class="logo">IOL</div>
        <div class="brand-text">
          <div class="brand-title">Portfolio</div>
          <div class="brand-sub">Dashboard local (SQLite)</div>
        </div>
      </div>
      <nav class="nav">
        <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">Dashboard</a>
        <a href="/assets" class="nav-link{% if request.url.path == '/assets' %} active{% endif %}">Activos</a>
        <a href="/history" class="nav-link{% if request.url.path == '/history' %} active{% endif %}">Historia</a>
      </nav>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <span>Fuente: <code>data/iol_history.db</code> (snapshots)</span>
    </footer>
  </body>
</html>
